<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Photo Gallery (Mobile)</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial;
  margin: 0;
  padding: 10px;
  background: #f0f2f5;
}

h1 {
  text-align: center;
  font-size: 20px;
}

/* MOBILE STACKED WINDOWS */
.window {
  background: white;
  border-radius: 12px;
  margin-bottom: 15px;
  overflow: hidden;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.window-header img {
  width: 100%;
  height: 140px;
  object-fit: cover;
}

.window-title {
  padding: 10px;
  font-weight: bold;
}

/* OPEN BUTTON */
.open-btn {
  display: block;
  margin: 10px;
  padding: 10px;
  text-align: center;
  background: #28a745;
  color: white;
  border-radius: 8px;
  text-decoration: none;
}

/* MOBILE GRID (2 columns) */
.gallery {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
  padding: 10px;
}

.photo {
  display: flex;
  flex-direction: column;
  gap: 5px;
}

.photo img {
  width: 100%;
  aspect-ratio: 1 / 1;
  object-fit: cover;
  border-radius: 8px;
}

.download-btn {
  display: block;
  text-align: center;
  padding: 6px;
  background: #007bff;
  color: white;
  text-decoration: none;
  border-radius: 6px;
  font-size: 12px;
}
</style>
</head>

<body>

<h1>Mobile Gallery</h1>

<div id="container"></div>

<script>
const API_KEY = "AIzaSyDsLv4fSrtWzohfpbuL0tVZHIhymmDyTPs";

const folders = [
  {
    name: "Linsly Lacrosse vs. University High School",
    id: "1V80GO5H5dxtVd9_bNn9xlJiI-TLGFHE2",
    cover: "https://www.lacrossemonkey.com/media/wysiwyg/Lacrosse/2026/01Jan/Heads_Static_Banner_Update_Jan2026.jpg"
  }
];
const container = document.getElementById("container");

function createMobileWindow(folder) {

  const div = document.createElement("div");
  div.className = "window";

  div.innerHTML = `
    <img src="${folder.cover}">
    <div class="window-title">${folder.name}</div>
    <a class="open-btn">Open Gallery</a>
    <div class="gallery" style="display:none;"></div>
  `;

  container.appendChild(div);

  const btn = div.querySelector(".open-btn");
  const gallery = div.querySelector(".gallery");

  btn.addEventListener("click", async () => {

    if (gallery.style.display === "grid") {
      gallery.style.display = "none";
      return;
    }

    gallery.style.display = "grid";
    gallery.innerHTML = "Loading...";

    try {
      const url = `https://www.googleapis.com/drive/v3/files?q='${folder.id}'+in+parents+and+mimeType contains 'image/'&key=${API_KEY}&fields=files(id,name)`;

      const res = await fetch(url);
      const data = await res.json();

      if (!data.files) {
        gallery.innerHTML = "No images found";
        return;
      }

      gallery.innerHTML = "";

      data.files.forEach(file => {

        const imgUrl = `https://lh3.googleusercontent.com/d/${file.id}=w800`;
        const downloadUrl = `https://drive.google.com/uc?export=download&id=${file.id}`;

        const photo = document.createElement("div");
        photo.className = "photo";

        photo.innerHTML = `
          <img src="${imgUrl}">
          <a class="download-btn" href="${downloadUrl}" download>
            Download
          </a>
        `;

        gallery.appendChild(photo);
      });

    } catch (err) {
      gallery.innerHTML = "Error loading gallery";
    }
  });
}

folders.forEach(createMobileWindow);
</script>

</body>
</html>
